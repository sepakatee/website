<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Dokumen Sewa Menyewa | Sepakatee</title>
    <link rel="icon" type="image/png" href="https://sepakatee.github.io/website/asset/Sepakatee%20Logo.png">
    <link rel="apple-touch-icon" href="https://sepakatee.github.io/website/asset/Sepakatee%20Logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .preview-container {
            display: grid;
            grid-template-columns: 1fr 320px;
            min-height: 100vh;
            gap: 0;
        }
        .preview-document {
            background: white;
            overflow-y: auto;
            padding: 40px;
        }
        .preview-sidebar {
            background: #fafafa;
            border-left: 1px solid #ddd;
            padding: 24px 16px;
            overflow-y: auto;
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .preview-header {
            background: white;
            border-bottom: 1px solid #ddd;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .preview-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .preview-header-left a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        .preview-header-left a:hover {
            color: #333;
        }
        .preview-header-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .preview-header-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
        .btn-secondary {
            background: white;
            color: #333;
            border: 1px solid #ddd;
        }
        .btn-secondary:hover {
            background: #f5f5f5;
        }
        .sidebar-section {
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e5e5;
        }
        .sidebar-section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .sidebar-section-content {
            font-size: 13px;
            line-height: 1.5;
            color: #666;
        }
        .action-button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-button-primary {
            background: #2563eb;
            color: white;
        }
        .action-button-primary:hover {
            background: #1d4ed8;
        }
        .action-button-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }
        .action-button-secondary:hover {
            background: #e5e5e5;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            background: #ecfdf5;
            color: #047857;
            margin-top: 8px;
        }
        .error-message {
            padding: 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 6px;
            color: #991b1b;
            font-size: 13px;
            margin-top: 8px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .document-content {
            background: white;
            padding: 40px;
            line-height: 1.8;
        }
        .document-content h1 {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .document-content p {
            text-align: justify;
            margin-bottom: 12px;
        }
        .document-content ol {
            margin: 12px 0 16px 20px;
        }
        .document-content li {
            margin: 8px 0;
            text-align: justify;
        }
        @media (max-width: 1024px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
            .preview-sidebar {
                position: static;
                height: auto;
                border-left: none;
                border-top: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>
<div class="preview-header">
    <div class="preview-header-left">
        <a href="form/" style="text-decoration: none;">← Kembali ke Form</a>
        <span class="preview-header-title">Preview Dokumen</span>
    </div>
    <div class="preview-header-actions">
        <button class="btn btn-secondary" onclick="downloadDocxFromPreview()">
            📥 Unduh .docx
        </button>
    </div>
</div>

<div class="preview-container">
    <div class="preview-document" id="previewContent">
        <div class="loading">
            <div class="spinner"></div>
            <p>Memproses dokumen Anda...</p>
        </div>
    </div>
    
    <div class="preview-sidebar">
        <div class="sidebar-section">
            <div class="sidebar-section-title">Status Dokumen</div>
            <div class="sidebar-section-content">
                Dokumen siap untuk diunduh dan ditandatangani.
                <span class="status-badge">✓ Siap</span>
            </div>
        </div>
        
        <div class="sidebar-section">
            <div class="sidebar-section-title">Opsi</div>
            <button class="action-button action-button-primary" onclick="downloadDocxFromPreview()">
                Unduh Dokumen (.docx)
            </button>
            <button class="action-button action-button-secondary" onclick="printDocument()">
                Cetak Dokumen
            </button>
            <button class="action-button action-button-primary" onclick="proceedToPayment()" style="margin-top: 12px;">
                Lanjut ke Pembayaran
            </button>
        </div>
        
        <div class="sidebar-section">
            <div class="sidebar-section-title">Catatan</div>
            <div class="sidebar-section-content">
                • Periksa kembali semua data sebelum pembayaran
                • Dokumen dapat diunduh tanpa membayar
                • Pembayaran untuk fitur premium dan dukungan
            </div>
        </div>
        
        <div id="errorContainer"></div>
    </div>
</div>

<script src="../form.js"></script>
<script src="../../_shared/pricing.js"></script>
<script src="../../_shared/checkout-endpoint.js"></script>
<script src="../../_shared/ipaymu-checkout.js"></script>
<script>
    // Load and display the document from localStorage/sessionStorage
    function loadDocument() {
        const previewContent = document.getElementById('previewContent');
        
        try {
            // Try to get saved form data
            const savedData = sessionStorage.getItem('previewDocumentData') ||
                             sessionStorage.getItem('pendingDocument') ||
                             localStorage.getItem('formsewamenyewa_progress_latest');
            
            if (!savedData) {
                previewContent.innerHTML = `
                    <div style="padding: 40px; text-align: center;">
                        <p style="color: #666; margin-bottom: 20px;">Tidak ada data dokumen yang ditemukan.</p>
                        <a href="form/" class="btn btn-primary">Kembali ke Form</a>
                    </div>
                `;
                return;
            }
            
            let formData;
            try {
                const pendingDoc = JSON.parse(savedData);
                formData = pendingDoc.formData || pendingDoc;
            } catch {
                formData = JSON.parse(savedData);
            }
            
            // Generate and display the document
            if (typeof generateDocument === 'function') {
                const documentHTML = generateDocument(formData);
                previewContent.innerHTML = documentHTML;
                
                // Store the current document for download
                window.currentDocument = documentHTML;
                window.currentFormData = formData;
            } else {
                throw new Error('generateDocument function not available');
            }
        } catch (error) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `
                <div class="error-message">
                    <strong>Error:</strong> ${error.message}<br>
                    Silakan kembali ke form dan coba lagi.
                </div>
            `;
            previewContent.innerHTML = `
                <div style="padding: 40px; text-align: center;">
                    <p style="color: #999;">Terjadi kesalahan saat memuat dokumen.</p>
                    <a href="form/" class="btn btn-primary" style="display: inline-block; margin-top: 12px;">Kembali ke Form</a>
                </div>
            `;
        }
    }
    
    // Download as DOCX
    async function downloadDocxFromPreview() {
        try {
            if (!window.currentDocument || !window.currentFormData) {
                alert('Tidak ada data dokumen untuk diunduh.');
                return;
            }
            
            const filename = `Perjanjian_Sewa_Menyewa_${new Date().getTime()}.docx`;
            
            // Try to use server-side generation if available
            if (typeof downloadDocumentAsDocx === 'function') {
                await downloadDocumentAsDocx(window.currentFormData, filename);
            } else {
                // Fallback: use client-side library (requires additional setup)
                alert('Fitur unduh DOCX memerlukan server-side generation. Silakan hubungi support.');
            }
        } catch (error) {
            alert('Error saat mengunduh: ' + error.message);
        }
    }
    
    // Print the document
    function printDocument() {
        const printWindow = window.open('', '', 'width=800,height=600');
        const previewContent = document.getElementById('previewContent').innerHTML;
        
        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Perjanjian Sewa Menyewa Tempat</title>
                <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
                <style>
                    body { font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 40px; }
                    @media print { body { padding: 0; } }
                </style>
            </head>
            <body>
                ${previewContent}
            </body>
            </html>
        `);
        printWindow.document.close();
        setTimeout(() => printWindow.print(), 250);
    }
    
    // Proceed to payment
    function proceedToPayment() {
        if (!window.currentFormData) {
            alert('Tidak ada data untuk pengembalian pembayaran.');
            return;
        }
        
        // Store for payment page
        sessionStorage.setItem('pendingDocument', JSON.stringify({
            formData: window.currentFormData,
            timestamp: Date.now()
        }));
        
        // Redirect to payment page
        window.location.href = 'payment/';
    }
    
    // Load document when page loads
    document.addEventListener('DOMContentLoaded', loadDocument);
</script>
</body>
</html>
