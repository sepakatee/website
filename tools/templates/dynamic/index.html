<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template dinamis | Sepakatee</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" href="https://sepakatee.github.io/website/asset/Blue_and_Black_Minimalist_Brand_Logo-removebg-preview.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../style.css?v=14" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
      body { margin: 0; background: #fafafa; font-family: Poppins, system-ui, sans-serif; color: var(--primary, #0f0f10); }
      .dyn-wrap { max-width: 720px; margin: 0 auto; padding: 32px 20px 64px; }
      .dyn-back { display: inline-block; margin-bottom: 20px; font-size: 0.875rem; font-weight: 500; color: var(--primary); text-decoration: none; }
      .dyn-back:hover { text-decoration: underline; }
      #dynLanding h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.02em; }
      .dyn-intro { color: rgba(15,15,16,.65); line-height: 1.6; margin: 0 0 28px; font-size: 0.9375rem; }
      .dyn-form { background: #fff; border: 1px solid rgba(15,15,16,.08); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
      .dyn-form h2 { font-size: 1rem; margin: 0 0 16px; }
      .dyn-field { margin-bottom: 16px; }
      .dyn-field label { display: block; font-size: 0.8125rem; font-weight: 600; color: rgba(15,15,16,.55); margin-bottom: 6px; }
      .dyn-field input, .dyn-field textarea {
        width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid rgba(15,15,16,.12);
        border-radius: 8px; font-family: inherit; font-size: 0.875rem;
      }
      #dynPreviewHost { margin-bottom: 20px; }
      #dynPreviewHost h2 { font-size: 1rem; margin: 0 0 12px; }
      .dyn-preview-pre {
        white-space: pre-wrap; background: #fff; border: 1px solid rgba(15,15,16,.08); border-radius: 12px;
        padding: 20px; font-size: 0.8125rem; line-height: 1.55; margin: 0;
      }
      .dyn-actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
      .dyn-price { font-size: 0.875rem; color: rgba(15,15,16,.55); }
      .dyn-price strong { color: var(--primary); }
    </style>
  </head>
  <body>
    <div class="dyn-wrap">
      <a class="dyn-back" href="../catalog.html">← Library</a>
      <div id="dynLanding"></div>
      <div id="dynFormHost"></div>
      <div id="dynPreviewHost"></div>
      <div class="dyn-actions">
        <button type="button" class="btn btn--primary" id="dynPayBtn" disabled>Lanjut ke pembayaran</button>
        <span class="dyn-price" id="dynPriceLine"></span>
      </div>
      <p style="margin-top:28px;font-size:0.75rem;color:rgba(15,15,16,.45);">
        Demo teknis — set <code>window.__SEP_CREATE_PAYMENT_URL__</code> di console untuk uji Supabase Function.
      </p>
    </div>

    <!-- Opsional: window.__SEP_CREATE_PAYMENT_URL__ = 'https://xxx.supabase.co/functions/v1/create-ipaymu-session'; -->
    <script src="../_shared/pricing.js"></script>
    <script src="../_shared/ipaymu-checkout.js"></script>
    <script src="../_shared/schema-dynamic-page.js"></script>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var schemaPath = params.get('schema') || '../data/schemas/sample-tier-b.json';

        var pr = window.SepakateePricing.getByFlowKey('sample-tier-b');
        var el = document.getElementById('dynPriceLine');
        if (el) el.innerHTML = 'Tier B · <strong>' + window.SepakateePricing.formatIdr(pr.priceIdr) + '</strong>';

        fetch(schemaPath)
          .then(function (r) {
            if (!r.ok) throw new Error('Schema HTTP ' + r.status);
            return r.json();
          })
          .then(function (schema) {
            window.SepakateeSchemaDynamic.mount(schema);
          })
          .catch(function (e) {
            document.getElementById('dynLanding').innerHTML =
              '<h1>Gagal memuat schema</h1><p>' + String(e.message || e) + '</p>';
          });
      })();
    </script>
  </body>
</html>
