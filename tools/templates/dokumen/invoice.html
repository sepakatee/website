<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice - {{ref}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #fff;
        color: #111;
        padding: 0;
        margin: 0;
      }

      #invoice-content {
        width: 640px;
      }

      .invoice-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 28px;
        padding-bottom: 18px;
        border-bottom: 1px solid #000;
      }

      .invoice-brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .invoice-brand img {
        width: 42px;
        height: 42px;
        object-fit: contain;
      }

      .invoice-brand-text {
        font-size: 1.25rem;
        font-weight: 700;
        color: #000;
        letter-spacing: -0.02em;
      }

      .invoice-doc-type {
        font-size: 0.6875rem;
        font-weight: 600;
        color: #000;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .invoice-meta {
        margin-bottom: 22px;
      }

      .invoice-meta-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #e5e5e5;
        gap: 16px;
      }
      .invoice-meta-row:last-child {
        border-bottom: none;
      }

      .invoice-meta-label {
        color: #666;
        font-size: 0.8125rem;
        font-weight: 500;
      }

      .invoice-meta-value {
        font-weight: 600;
        color: #111;
        text-align: right;
        overflow-wrap: anywhere;
      }

      .invoice-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 18px;
      }

      .invoice-table th {
        background: #111;
        color: #fff;
        padding: 12px 16px;
        text-align: left;
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .invoice-table th:last-child {
        text-align: right;
      }

      .invoice-table td {
        padding: 16px 16px;
        border-bottom: 1px solid #e5e5e5;
        vertical-align: top;
      }

      .invoice-table td:last-child {
        text-align: right;
        font-weight: 600;
      }

      .invoice-total-row td {
        background: #f5f5f5;
        font-weight: 800;
        border-bottom: none;
      }

      .invoice-footer {
        margin-top: 26px;
        padding-top: 18px;
        border-top: 1px solid #e5e5e5;
        font-size: 0.75rem;
        color: #666;
      }
      .invoice-footer p {
        margin-bottom: 6px;
      }

      @media (max-width: 640px) {
        #invoice-content {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="invoice-content">
      <div class="invoice-header">
        <div class="invoice-brand">
          <img
            src="https://sepakatee.github.io/website/asset/Blue_and_Black_Minimalist_Brand_Logo-removebg-preview.png"
            alt="Sepakatee"
          />
          <span class="invoice-brand-text">Sepakatee</span>
        </div>
        <div class="invoice-doc-type">INVOICE</div>
      </div>

      <div class="invoice-meta">
        <div class="invoice-meta-row">
          <span class="invoice-meta-label">No. Invoice</span>
          <span class="invoice-meta-value">{{ref}}</span>
        </div>
        <div class="invoice-meta-row">
          <span class="invoice-meta-label">Tanggal</span>
          <span class="invoice-meta-value">{{date}}</span>
        </div>
        <div class="invoice-meta-row">
          <span class="invoice-meta-label">Nama</span>
          <span class="invoice-meta-value">{{name}}</span>
        </div>
        <div class="invoice-meta-row">
          <span class="invoice-meta-label">Email</span>
          <span class="invoice-meta-value">{{email}}</span>
        </div>
      </div>

      <table class="invoice-table">
        <thead>
          <tr>
            <th>Deskripsi</th>
            <th>Jumlah</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <div style="font-weight: 700; margin-bottom: 6px; letter-spacing: -0.01em;">
                Paket {{tierName}}
              </div>
              <div style="color:#333;">
                Dokumen: {{docTitle}}
              </div>
            </td>
            <td>{{price}}</td>
          </tr>
          <tr class="invoice-total-row">
            <td>Total</td>
            <td>{{price}}</td>
          </tr>
        </tbody>
      </table>

      <div class="invoice-footer">
        <p>Metode pembayaran: iPaymu</p>
        <p>Terima kasih atas pembelian Anda.</p>
      </div>
    </div>
  </body>
</html>
