<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terima kasih | Demo dynamic</title>
    <link rel="stylesheet" href="../../../style.css?v=14" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      body { font-family: Poppins, system-ui, sans-serif; margin: 0; padding: 48px 24px; background: #fafafa; color: var(--primary, #0f0f10); }
      .card { max-width: 480px; margin: 0 auto; background: #fff; padding: 32px; border-radius: 12px; border: 1px solid rgba(15,15,16,.08); text-align: center; }
      h1 { font-size: 1.25rem; margin: 0 0 12px; }
      p { color: rgba(15,15,16,.65); font-size: 0.9375rem; line-height: 1.5; }
      a { color: var(--primary); font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Terima kasih</h1>
      <p>Pembayaran demo (dynamic template). Jika status di URL menunjukkan batal, kamu bisa kembali ke form.</p>
      <p id="refLine" style="font-size:0.8125rem;"></p>
      <p><a href="index.html">← Kembali ke demo</a> · <a href="../catalog.html">Library</a></p>
    </div>
    <script>
      (function () {
        var p = new URLSearchParams(window.location.search);
        var ref = p.get('ref');
        var st = p.get('status');
        if (ref) document.getElementById('refLine').textContent = 'Ref: ' + ref + (st ? ' · Status: ' + st : '');
      })();
    </script>
  </body>
</html>
